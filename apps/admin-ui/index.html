<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#faf8f2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1513" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="USAN Admin — operator console for daily wellness check-in calls." />
    <title>USAN Admin</title>
    <script>
      // Apply the persisted (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("usan-theme");
          var dark = t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
