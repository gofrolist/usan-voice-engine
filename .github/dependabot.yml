version: 2
# Non-major bumps auto-merge once required CI checks pass — see
# .github/workflows/dependabot-auto-merge.yml. Majors open individually for manual review.
updates:
  # Python deps (uv) — API
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      api-python:
        patterns: ["*"]

  # Python deps (uv) — Agent
  - package-ecosystem: "pip"
    directory: "/services/agent"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      agent-python:
        patterns: ["*"]

  # JS deps (npm) — Admin UI
  - package-ecosystem: "npm"
    directory: "/apps/admin-ui"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Only group minor + patch updates. Majors open as individual PRs so each
      # breaking upgrade (e.g. eslint flat-config, tailwind v4, react 19) can be
      # migrated and reviewed in isolation instead of one unreviewable group bump.
      admin-ui-npm:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]

  # Dockerfile base images (python-slim, uv). Note: image tags in
  # infra/docker-compose.yml (pgvector, redis, livekit, sip) are NOT covered —
  # Dependabot's docker ecosystem scans Dockerfiles only, not compose files.
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(infra)"
  - package-ecosystem: "docker"
    directory: "/services/agent"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(infra)"
