version: 2
updates:
  # Python deps (uv) — API
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      api-python:
        patterns: ["*"]

  # Python deps (uv) — Agent
  - package-ecosystem: "pip"
    directory: "/services/agent"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      agent-python:
        patterns: ["*"]

  # JS deps (npm) — Admin UI
  - package-ecosystem: "npm"
    directory: "/apps/admin-ui"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      admin-ui-npm:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]

  # Dockerfile base images (python-slim, uv). Note: image tags in
  # infra/docker-compose.yml (pgvector, redis, livekit, sip) are NOT covered —
  # Dependabot's docker ecosystem scans Dockerfiles only, not compose files.
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(infra)"
  - package-ecosystem: "docker"
    directory: "/services/agent"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(infra)"
