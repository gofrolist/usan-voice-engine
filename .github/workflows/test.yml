name: Test

# PR-only. The push-to-main run re-ran the full suite on already-merged,
# already-green code — it gated no deploy (build is tag-only) and fed no consumer.
# Branch protection's required checks are produced by the PR run, so dropping the
# push trigger does not weaken the merge gate.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-gate the monorepo suites: a PR touching only one area shouldn't run the
  # other areas' tests. Each filter also matches this workflow file, so editing
  # test.yml re-runs everything. A skipped job reports "skipped" = pass, so a
  # required-check merge gate is unaffected.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      admin_ui: ${{ steps.filter.outputs.admin_ui }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/test.yml'
            agent:
              - 'services/agent/**'
              - '.github/workflows/test.yml'
            admin_ui:
              - 'apps/admin-ui/**'
              - '.github/workflows/test.yml'
            scripts:
              - 'scripts/**'
              - '.github/workflows/test.yml'

  pytest-api:
    name: pytest (apps/api)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - name: Install
        working-directory: apps/api
        run: uv sync --frozen
      - name: pytest
        working-directory: apps/api
        # -n auto runs the suite across all runner cores. Each xdist worker is a
        # separate process, so the session-scoped `database_url` fixture spins its
        # OWN throwaway Postgres container per worker — workers are fully isolated
        # (no shared DB), and the per-test TRUNCATE stays correct. ~1.9x locally
        # (116s -> 61s at -n 2). Drop -v: 1300+ verbose lines is just log I/O.
        run: uv run pytest -n auto --tb=short

  pytest-agent:
    name: pytest (services/agent)
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: services/agent/uv.lock
      - name: Install
        working-directory: services/agent
        run: uv sync --frozen
      - name: pytest
        working-directory: services/agent
        run: uv run pytest -v --tb=short

  pytest-scripts:
    name: pytest (scripts)
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest pyyaml
      - name: pytest
        run: python -m pytest scripts/tests -v --tb=short

  vitest-admin-ui:
    name: vitest (apps/admin-ui)
    needs: changes
    if: needs.changes.outputs.admin_ui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin-ui/package-lock.json
      - name: Install
        working-directory: apps/admin-ui
        run: npm ci
      - name: vitest
        working-directory: apps/admin-ui
        run: npm test
