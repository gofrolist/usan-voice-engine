name: Test

# PR-only. The push-to-main run re-ran the full suite on already-merged,
# already-green code — it gated no deploy (build is tag-only) and fed no consumer.
# Branch protection's required checks are produced by the PR run, so dropping the
# push trigger does not weaken the merge gate.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-gate the monorepo suites: a PR touching only one area shouldn't run the
  # other areas' tests. Each filter also matches this workflow file, so editing
  # test.yml re-runs everything. A skipped job reports "skipped" = pass, so a
  # required-check merge gate is unaffected.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      admin_ui: ${{ steps.filter.outputs.admin_ui }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/test.yml'
            agent:
              - 'services/agent/**'
              - '.github/workflows/test.yml'
            admin_ui:
              - 'apps/admin-ui/**'
              - '.github/workflows/test.yml'
            scripts:
              - 'scripts/**'
              - '.github/workflows/test.yml'

  pytest-api:
    name: pytest (apps/api)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Overlap the ~160MB (compressed) Postgres image pull with checkout + uv sync:
      # testcontainers would otherwise pull it serially inside the first test's
      # session fixture. Backgrounded so the step returns immediately; docker
      # serializes a concurrent pull of the same image, so if pytest reaches the
      # fixture first it simply waits on the in-flight layers.
      - name: Pre-pull Postgres image (background)
        run: docker pull -q pgvector/pgvector:pg18 >/dev/null 2>&1 &
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - name: Install
        working-directory: apps/api
        run: uv sync --frozen
      - name: pytest
        working-directory: apps/api
        # Each xdist worker is a separate process, so the session-scoped
        # `database_url` fixture spins its OWN throwaway Postgres container per
        # worker — workers are fully isolated (no shared DB), and the per-test
        # TRUNCATE stays correct. -n 8 (not auto=4): the suite is DB-I/O-wait
        # dominated (~50% worker CPU idle measured at -n 4), so 2x-oversubscribing
        # the 4 vCPUs keeps them busy. --dist worksteal comes from addopts; the
        # explicit -n here overrides addopts' -n auto (CLI args follow addopts).
        # Drop -v: 1300+ verbose lines is just log I/O.
        run: uv run pytest -n 8 --tb=short

  pytest-agent:
    name: pytest (services/agent)
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: services/agent/uv.lock
      - name: Install
        working-directory: services/agent
        run: uv sync --frozen
      - name: pytest
        working-directory: services/agent
        run: uv run pytest -v --tb=short

  pytest-scripts:
    name: pytest (scripts)
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest pyyaml
      - name: pytest
        run: python -m pytest scripts/tests -v --tb=short

  vitest-admin-ui:
    name: vitest (apps/admin-ui)
    needs: changes
    if: needs.changes.outputs.admin_ui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin-ui/package-lock.json
      - name: Install
        working-directory: apps/admin-ui
        run: npm ci
      - name: vitest
        working-directory: apps/admin-ui
        run: npm test
