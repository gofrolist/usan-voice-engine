name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest-api:
    name: pytest (apps/api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.16"
      - name: Install
        working-directory: apps/api
        run: uv sync --frozen
      - name: pytest
        working-directory: apps/api
        run: uv run pytest -v --tb=short

  pytest-agent:
    name: pytest (services/agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.16"
      - name: Install
        working-directory: services/agent
        run: uv sync --frozen
      - name: pytest
        working-directory: services/agent
        run: uv run pytest -v --tb=short

  pytest-scripts:
    name: pytest (scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: pytest
        run: python -m pytest scripts/tests -v --tb=short
