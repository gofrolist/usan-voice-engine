name: Lint

# PR-only. The push-to-main run was a redundant re-run of the same lint on
# already-merged, already-green code — it gated no deploy (build is tag-only) and
# fed no consumer. Branch protection's required checks are produced by the PR run,
# so dropping the push trigger does not weaken the merge gate.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-api:
    name: Lint Python (apps/api)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - name: Install
        working-directory: apps/api
        run: uv sync --frozen
      - name: ruff check
        working-directory: apps/api
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: apps/api
        run: uv run ruff format --check .
      - name: mypy
        working-directory: apps/api
        run: uv run mypy

  ruff-agent:
    name: Lint Python (services/agent)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: services/agent/uv.lock
      - name: Install
        working-directory: services/agent
        run: uv sync --frozen
      - name: ruff check
        working-directory: services/agent
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: services/agent
        run: uv run ruff format --check .
      - name: mypy
        working-directory: services/agent
        run: uv run mypy

  lint-admin-ui:
    name: Lint admin-ui (apps/admin-ui)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin-ui/package-lock.json
      - name: Install
        working-directory: apps/admin-ui
        run: npm ci
      - name: eslint
        working-directory: apps/admin-ui
        run: npm run lint
      - name: typecheck
        working-directory: apps/admin-ui
        run: npm run typecheck

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
