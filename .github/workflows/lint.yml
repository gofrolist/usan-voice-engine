name: Lint

# PR-only. The push-to-main run was a redundant re-run of the same lint on
# already-merged, already-green code — it gated no deploy (build is tag-only) and
# fed no consumer. Branch protection's required checks are produced by the PR run,
# so dropping the push trigger does not weaken the merge gate.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-gate the monorepo lint jobs: a PR touching only one area shouldn't lint
  # the others. Each filter also matches this workflow file, so editing lint.yml
  # re-runs everything. A skipped job reports "skipped" = pass, so a required-check
  # merge gate is unaffected. (gitleaks always runs — it's a security scan.)
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      admin_ui: ${{ steps.filter.outputs.admin_ui }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/lint.yml'
            agent:
              - 'services/agent/**'
              - '.github/workflows/lint.yml'
            admin_ui:
              - 'apps/admin-ui/**'
              - '.github/workflows/lint.yml'

  ruff-api:
    name: Lint Python (apps/api)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - name: Install
        working-directory: apps/api
        run: uv sync --frozen
      - name: ruff check
        working-directory: apps/api
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: apps/api
        run: uv run ruff format --check .
      - name: mypy
        working-directory: apps/api
        run: uv run mypy

  ruff-agent:
    name: Lint Python (services/agent)
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: services/agent/uv.lock
      - name: Install
        working-directory: services/agent
        run: uv sync --frozen
      - name: ruff check
        working-directory: services/agent
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: services/agent
        run: uv run ruff format --check .
      - name: mypy
        working-directory: services/agent
        run: uv run mypy

  lint-admin-ui:
    name: Lint admin-ui (apps/admin-ui)
    needs: changes
    if: needs.changes.outputs.admin_ui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin-ui/package-lock.json
      - name: Install
        working-directory: apps/admin-ui
        run: npm ci
      - name: eslint
        working-directory: apps/admin-ui
        run: npm run lint
      - name: typecheck
        working-directory: apps/admin-ui
        run: npm run typecheck

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
