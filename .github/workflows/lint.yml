name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff-api:
    name: Lint Python (apps/api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.11.16"
      - name: Install
        working-directory: apps/api
        run: uv sync --frozen
      - name: ruff check
        working-directory: apps/api
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: apps/api
        run: uv run ruff format --check .
      - name: mypy
        working-directory: apps/api
        run: uv run mypy

  ruff-agent:
    name: Lint Python (services/agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.11.16"
      - name: Install
        working-directory: services/agent
        run: uv sync --frozen
      - name: ruff check
        working-directory: services/agent
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: services/agent
        run: uv run ruff format --check .
      - name: mypy
        working-directory: services/agent
        run: uv run mypy

  lint-admin-ui:
    name: Lint admin-ui (apps/admin-ui)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin-ui/package-lock.json
      - name: Install
        working-directory: apps/admin-ui
        run: npm ci
      - name: eslint
        working-directory: apps/admin-ui
        run: npm run lint
      - name: typecheck
        working-directory: apps/admin-ui
        run: npm run typecheck

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
