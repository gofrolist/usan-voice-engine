name: Build & Deploy

# Build + deploy run ONLY on v* tags. A push to main no longer triggers a build:
# the deploy is tag-gated, the main-push build only produced an unused `latest`
# image, and tagging a just-merged commit fired this workflow twice (a redundant
# 4-image build in parallel with the tag run). PRs validate the Docker build via
# build-check.yml (push: false) — earlier, where it's actually useful.
on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  # Artifact Registry (Plan 4e E). The VM pulls from here keyless via its attached
  # SA; CI pushes here keyless via Workload Identity Federation. These are not
  # secrets (project number, SA email, repo path are all non-sensitive).
  GAR: us-east1-docker.pkg.dev/usan-retirement/usan
  WIF_PROVIDER: projects/505865962917/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: github-deployer@usan-retirement.iam.gserviceaccount.com

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for WIF OIDC (google-github-actions/auth)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # GHCR stays as a mirror (keyless via GITHUB_TOKEN) so old/new tags remain
      # pullable for break-glass rollback; the VM no longer uses it.
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Keyless auth to GCP via WIF, then log Docker into Artifact Registry with the
      # short-lived access token (no SA JSON key in GitHub secrets).
      - name: Authenticate to Google Cloud (WIF)
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: us-east1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Compute image tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push api
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: apps/api
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/usan-api:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/usan-api:${{ github.sha }}
            ${{ env.GAR }}/usan-api:${{ steps.tag.outputs.value }}
            ${{ env.GAR }}/usan-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push agent base (model pre-warm)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: services/agent
          file: services/agent/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/usan-agent-base:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=agent-base
          cache-to: type=gha,mode=max,scope=agent-base

      - name: Build & push agent app
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: services/agent
          file: services/agent/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/usan-agent-base:${{ steps.tag.outputs.value }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/usan-agent:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/usan-agent:${{ github.sha }}
            ${{ env.GAR }}/usan-agent:${{ steps.tag.outputs.value }}
            ${{ env.GAR }}/usan-agent:${{ github.sha }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

      # Admin UI static SPA image (Plan admin-5). Vite build baked into a tiny
      # Caddy file_server; served behind the edge Caddy at admin.<domain>.
      - name: Build & push admin-ui
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: apps/admin-ui
          file: apps/admin-ui/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/usan-admin-ui:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/usan-admin-ui:${{ github.sha }}
            ${{ env.GAR }}/usan-admin-ui:${{ steps.tag.outputs.value }}
            ${{ env.GAR }}/usan-admin-ui:${{ github.sha }}
          cache-from: type=gha,scope=admin-ui
          cache-to: type=gha,mode=max,scope=admin-ui

  deploy:
    name: Deploy to VM
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Copy compose files to VM
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/docker-compose.yml,infra/docker-compose.prod.yml,infra/docker-compose.tls.yml,infra/docker-compose.monitoring.yml,infra/docker-compose.admin.yml,infra/Caddyfile,infra/prometheus,infra/grafana,infra/provision-sip-inbound.sh"
          target: "/opt/usan"
          overwrite: true

      - name: Pull images and bring stack up
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_REF_NAME
          script: |
            set -euo pipefail
            cd /opt/usan
            # Pull images from Artifact Registry keyless: configure the gcloud docker
            # cred helper, which mints a token from the VM's attached SA (artifactregistry
            # .reader) at pull time. No GHCR_PAT. Idempotent; ensured here because the
            # running VM does not re-run startup.sh. Plan 4e E4.
            gcloud auth configure-docker us-east1-docker.pkg.dev -q
            export IMAGE_TAG="${GITHUB_REF_NAME}"
            COMPOSE="docker compose --env-file infra/.env \
              -f infra/docker-compose.yml \
              -f infra/docker-compose.prod.yml \
              -f infra/docker-compose.tls.yml \
              -f infra/docker-compose.monitoring.yml \
              -f infra/docker-compose.admin.yml"
            $COMPOSE pull
            $COMPOSE up -d
            $COMPOSE ps
            # Reclaim disk: drop images no longer used by a RUNNING container — i.e. the
            # previous release's version- and SHA-tagged images. Runs AFTER `up -d` so the
            # just-deployed images are in use and protected. Without this the 30G boot disk
            # fills after a handful of releases (each agent image is ~3.9G), eventually
            # ENOSPC-crashing the agent (it can't spawn its inference subprocess). Safe:
            # old tags re-pull from Artifact Registry for a break-glass rollback.
            docker image prune -af
            # LiveKit/redis runtime state (not in compose), so a redis/stack restart
            # drops them; reapplying every deploy keeps inbound calling durable.
            # Idempotent; reads TELNYX_INBOUND_DID + LiveKit creds from infra/.env.
            bash infra/provision-sip-inbound.sh

      - name: Post-deploy health check
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
        run: |
          set -e
          for i in $(seq 1 30); do
            if curl -fsS "https://${API_DOMAIN}/health" | grep -q '"status":"ok"'; then
              echo "healthy"; exit 0
            fi
            echo "waiting for health... ($i)"; sleep 5
          done
          echo "health check failed"; exit 1
