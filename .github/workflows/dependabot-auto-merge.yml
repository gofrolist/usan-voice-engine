name: Dependabot auto-merge

# Enable squash auto-merge on every Dependabot PR — majors included — so any bump that
# passes the required CI checks merges without a manual click. Auto-merge waits on main's
# required status checks (branch protection), so a red CI never lands: CI is the gate.
#
# pull_request_target runs in the BASE-repo context with a read/write token — a plain
# pull_request event from Dependabot only gets a read-only token. We never check out the
# PR's head code here (only read its metadata and call the API), so there is no
# untrusted-code-execution risk. All event/metadata values are passed via env and quoted.
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      - name: Enable auto-merge
        run: |
          echo "Auto-merging $NAMES ($UPDATE_TYPE) — lands once required checks pass."
          gh pr merge --auto --squash "$PR_URL"
        env:
          NAMES: ${{ steps.meta.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
