apiVersion: 1

# Grafana unified-alerting rules, provisioned as code (spec §5.1: "the rule is
# shipped, the channel is a deploy step"). Loaded at Grafana STARTUP from the
# mounted ./grafana/provisioning dir (docker-compose.monitoring.yml). Datasources
# hot-reload does NOT apply to alerting — a newly-added rule needs a grafana
# restart (`docker restart usan-grafana`).
#
# CONTACT POINT: the rules route to the "usan-operator" receiver below. The
# operator fills its email/Slack/PagerDuty address in at deploy time (it is a
# placeholder here — an empty addresses list is valid YAML and parses, but the
# rule will not actually notify until the operator supplies an endpoint, either
# by editing this file before deploy or via the Grafana UI contact-point editor).
groups:
  - orgId: 1
    name: usan-business
    folder: USAN
    # Evaluate every minute; increase() over the window catches a single event.
    interval: 1m
    rules:
      - uid: usan-urgent-followup-flag
        title: Urgent follow-up flag raised
        condition: C
        # FOR 0m: fire as soon as the threshold is crossed (an urgent flag is a
        # page-now event). PHI-free: the metric labels are bounded enums only.
        for: 0m
        # "No data" is the steady state for a low-traffic increase() query (fresh
        # deploy, restart, quiet day) — never page on it (the provisioning default,
        # NoData, routes to the contact point). An evaluation ERROR, by contrast,
        # must page: a silently-broken urgent-flag rule is worse than a spurious
        # one. Alerting matches file-provisioning's default (the UI/API default is
        # Error); pinned explicitly so a Grafana default change can't silence it.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              expr: sum(increase(usan_followup_flags_total{severity="urgent"}[10m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        labels:
          severity: page
        annotations:
          summary: One or more urgent follow-up flags were created in the last 10m.

      - uid: usan-sms-delivery-failed
        title: SMS delivery failing
        condition: C
        for: 0m
        # Same rationale as usan-urgent-followup-flag: no-data is normal, never
        # page on it; evaluation errors must surface.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              expr: sum(increase(usan_sms_messages_total{status="failed"}[15m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        labels:
          severity: warning
        annotations:
          summary: One or more queued SMS messages failed to send in the last 15m.

      - uid: usan-dial-slots-exhausted
        title: Autonomous dial slots exhausted
        condition: C
        # FOR 10m: a momentarily-full dial budget is normal under load; ten
        # sustained minutes of zero free slots means autonomous dialing has
        # stalled — for a wellness-check product, not dialing is a page.
        for: 10m
        # Same no-data/exec-error rationale as the rules above: the gauge is
        # absent until the retry orchestrator's first cycle (fresh deploy,
        # restart) — never page on that; evaluation errors must surface.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              expr: usan_dial_slots_free
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
        labels:
          severity: page
        annotations:
          summary: >-
            usan_dial_slots_free has been 0 for 10m. With
            CONCURRENCY_GATE_ENABLED=true this means autonomous dialing
            (schedules, batches, retries) has stopped. The gauge is exported
            whether or not the gate is enabled (spec §7), so this alert is
            meaningful ONLY while CONCURRENCY_GATE_ENABLED=true — with the
            gate off the cap is not enforced; silence the alert during
            gate-off operation.

      - uid: usan-webhook-delivery-failed
        title: Outbound webhook delivery failing
        condition: C
        for: 0m
        # Same rationale as usan-sms-delivery-failed: no-data is normal for a
        # low-traffic increase() query (fresh deploy, restart, quiet day), never
        # page on it; evaluation errors must surface.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              expr: sum(increase(usan_webhook_deliveries_total{outcome="failed"}[30m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        labels:
          severity: warning
        annotations:
          summary: >-
            One or more outbound webhook deliveries exhausted their retry
            ladder (outcome="failed") in the last 30m. Inspect the endpoint's
            recent deliveries via GET /v1/webhook-endpoints/{id}/deliveries
            (status, attempts, response codes, error type names).

      - uid: usan-webhook-endpoint-auto-disabled
        title: Webhook endpoint auto-disabled by circuit breaker
        condition: C
        for: 0m
        # Same no-data/exec-error rationale as the rules above. This rule is
        # load-bearing alongside usan-webhook-delivery-failed: a tripped breaker
        # MUTES the failure alert (disabled endpoints' rows are never claimed, so
        # they never reach outcome="failed") — the trip itself must page.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              expr: sum(increase(usan_webhook_endpoints_auto_disabled_total[30m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        labels:
          severity: warning
        annotations:
          summary: >-
            The circuit breaker auto-disabled a webhook endpoint after
            consecutive delivery failures. Runbook (spec §11.5): inspect
            GET /v1/webhook-endpoints for disabled_reason='circuit_breaker',
            review the endpoint's recent deliveries (updated_at = last
            attempt), fix the receiver, then PATCH enabled=true (resets the
            failure counter and resumes queued rows that haven't expired).

# Route every USAN alert to a single operator-owned contact point. The receiver
# below is a PLACEHOLDER: leave `usan-operator` named here and fill its actual
# address in at deploy time (edit the contactPoints block or use the Grafana UI).
policies:
  - orgId: 1
    receiver: usan-operator
    group_by:
      - alertname

contactPoints:
  - orgId: 1
    name: usan-operator
    receivers:
      # TODO(deploy): replace with the operator's real channel, e.g.
      #   - uid: usan-operator-email
      #     type: email
      #     settings:
      #       addresses: ops@example.com
      - uid: usan-operator-email
        type: email
        settings:
          addresses: ""
