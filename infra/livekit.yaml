port: 7880
redis:
  address: redis:6379
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false
# Keys are injected via the LIVEKIT_KEYS env var in docker-compose.yml.
# LiveKit server does NOT substitute ${...} placeholders in this YAML, so a
# `keys:` block here would be read literally and every client gets a 401.
logging:
  level: info
  json: true
turn:
  enabled: false
room:
  empty_timeout: 60
  max_participants: 10
webhook:
  api_key: ${LIVEKIT_API_KEY}
  urls:
    - http://api:8000/webhooks/livekit
