# Production overlay. Layer on top of the base file:
#   docker compose --env-file infra/.env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.prod.yml \
#     -f infra/docker-compose.tls.yml up -d
#
# Requires in .env: IMAGE_TAG, GHCR_OWNER, API_DOMAIN, LIVEKIT_DOMAIN,
# and LIVEKIT_URL=ws://livekit:7880 (internal hop stays plaintext on the
# compose network; external TLS is terminated by Caddy).
services:
  api:
    image: ghcr.io/${GHCR_OWNER}/usan-api:${IMAGE_TAG:?IMAGE_TAG must be set to an explicit tag}
    pull_policy: always
    build: !reset null
    # Prod talks to Cloud SQL via DATABASE_URL (private IP), not the local
    # container, so drop the base file's `depends_on: postgres` (Plan 4d).
    depends_on: !reset null
    # API is reached by Caddy over the compose network as api:8000.
    # Keep a loopback publish so on-VM `curl localhost:8000/health` works.
    ports: !override
      - "127.0.0.1:8000:8000"
    # Prod emits Cloud Logging JSON to stdout (ingested by the Ops Agent). Plan 4e B1.
    # Merges with the base file's environment map.
    environment:
      LOG_FORMAT: json

  agent:
    image: ghcr.io/${GHCR_OWNER}/usan-agent:${IMAGE_TAG:?IMAGE_TAG must be set to an explicit tag}
    pull_policy: always
    build: !reset null
    environment:
      LOG_FORMAT: json

  livekit:
    ports: !override
      - "127.0.0.1:7880:7880"
      - "127.0.0.1:7881:7881/tcp"
      # Keep this range SMALL: Docker spawns one docker-proxy process per published
      # port, so a 10k range (~10k procs) wedges the VM. ~100 ports handles our
      # volume; for higher concurrency switch to host networking / UDP mux (no
      # per-port proxy) — see Plan 4e. Must match rtc.port_range_end below.
      - "50000-50100:50000-50100/udp"
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        redis:
          address: redis:6379
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        logging:
          level: info
          json: true
        turn:
          enabled: false
        room:
          empty_timeout: 60
          max_participants: 10
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - http://api:8000/webhooks/livekit

  livekit-sip:
    ports: !override
      - "5060:5060/udp"
      # Small range — see the livekit note above (one docker-proxy per port).
      - "10000-10100:10000-10100/udp"
    environment:
      SIP_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ${LIVEKIT_URL}
        redis:
          address: redis:6379
        sip_port: 5060
        rtp_port: 10000-10100
        # Advertise the VM's PUBLIC IP (detected via STUN) in SIP Contact/SDP, not
        # the docker-internal 172.x address — otherwise Telnyx media / in-dialog
        # routing breaks. (Proper fix is host networking — Plan 4e.)
        use_external_ip: true
        logging:
          level: info
          json: true

  # Production uses Cloud SQL (Plan 4d), not the in-VM container. The `localdb`
  # profile is never enabled in prod, so this service does not start here. Dev
  # (base file, no overlay) has no profile on postgres and still runs it.
  postgres:
    profiles: ["localdb"]
