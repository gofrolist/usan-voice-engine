# TLS overlay — adds Caddy in front of api (+ livekit signaling).
# Use together with the base + prod overlays:
#   docker compose --env-file infra/.env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.prod.yml \
#     -f infra/docker-compose.tls.yml up -d
services:
  caddy:
    # Digest-pinned (immutable) — human tag in the comment.
    image: caddy:2-alpine@sha256:4679412ccd2114dca9f3017e2c460f76c9d8eb9e1850e72fb9ecda672e05c629  # 2-alpine
    container_name: usan-caddy
    init: true
    depends_on:
      - api
      - livekit
    environment:
      API_DOMAIN: ${API_DOMAIN}
      LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN}
    # livekit is host-networked in prod (Plan 4e C1); reach it from this bridge
    # container via the host gateway (the Caddyfile proxies host.docker.internal:7880).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./cloudflare-origin-pull-ca.pem:/etc/caddy/cloudflare-origin-pull-ca.pem:ro
      - caddy_data:/data
      - caddy_config:/config
    # Drop all caps, re-add only NET_BIND_SERVICE for the privileged 80/443 binds.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
