name: usan-voice-engine

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: usan-postgres
    init: true
    stop_signal: SIGINT
    stop_grace_period: 10s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: usan-redis
    init: true
    stop_grace_period: 5s
    # Message bus for livekit <-> livekit-sip coordination, not durable
    # storage, so persistence is disabled.
    command: redis-server --save "" --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.12.0
    container_name: usan-livekit
    init: true
    stop_grace_period: 5s
    depends_on:
      redis:
        condition: service_healthy
    ports:
      # Control plane — host-only. Agent/sip reach livekit over the Docker
      # network (ws://livekit:7880), not these host ports; only local tooling
      # (livekit-cli) needs them. Production fronts livekit with TLS (Plan 4).
      - "127.0.0.1:7880:7880"     # signaling (ws)
      - "127.0.0.1:7881:7881/tcp" # rtc tcp
      # Media plane — must stay reachable for RTP. Firewall at the host/VM
      # level in production (Plan 4).
      - "50000-50100:50000-50100/udp"  # rtc media
    environment:
      # livekit-server does NOT expand ${...} in a --config FILE, so the whole
      # config is passed via LIVEKIT_CONFIG (the server's --config-body env var)
      # where compose substitutes the placeholders — letting both `keys` and the
      # `webhook.api_key` resolve to the real key. Mirrors SIP_CONFIG_BODY below.
      LIVEKIT_CONFIG: |
        port: 7880
        redis:
          address: redis:6379
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: false
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        logging:
          level: info
          json: true
        turn:
          enabled: false
        room:
          empty_timeout: 60
          max_participants: 10
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - http://api:8000/webhooks/livekit
    restart: unless-stopped

  livekit-sip:
    image: livekit/sip:v1.3.1
    container_name: usan-livekit-sip
    init: true
    stop_grace_period: 5s
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "5060:5060/udp"
      # rtp_port range below must match. Kept small for Docker Desktop on Mac —
      # a 10k-port range makes up/down extremely slow and can wedge the VM
      # network layer. Widen for production on Linux.
      - "10000-10100:10000-10100/udp"
    environment:
      # livekit-sip does NOT expand ${...} in a --config file and has no
      # per-field env overrides, so credentials are injected via SIP_CONFIG_BODY
      # (the whole config as YAML). Compose substitutes the placeholders here.
      SIP_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ${LIVEKIT_URL}
        redis:
          address: redis:6379
        sip_port: 5060
        rtp_port: 10000-10100
        logging:
          level: info
          json: true
    restart: unless-stopped

  egress:
    image: livekit/egress:v1.13.0
    container_name: usan-egress
    init: true
    stop_grace_period: 5s
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    # Room-composite egress always runs headless Chrome (audio-only just drops the
    # video track in the same Chrome session): SYS_ADMIN is mandatory since egress
    # v1.7.6 or Chrome won't start, and /dev/shm must be enlarged.
    cap_add:
      - SYS_ADMIN
    # SYS_ADMIN is required by headless Chrome but is broad; block any further
    # privilege escalation (setuid binaries gaining caps) on top of it.
    security_opt:
      - "no-new-privileges:true"
    shm_size: "1gb"
    environment:
      # Egress does NOT expand ${...} in a --config file, so the whole config is
      # passed inline via EGRESS_CONFIG_BODY (compose substitutes the keys). The
      # internal hop ws://livekit:7880 is non-TLS, hence insecure: true. No storage
      # block: the GCS bucket + (empty) credentials are supplied per-request in the
      # RoomCompositeEgressRequest; empty credentials => upload via Application
      # Default Credentials (the GCE VM's attached service account).
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true
        redis:
          address: redis:6379
        logging:
          level: info
          json: true
    restart: unless-stopped

  api:
    image: usan-api:local
    container_name: usan-api
    pull_policy: build
    init: true
    stop_signal: SIGINT
    # Must exceed the shutdown drain window (OUTBOUND_RINGING_TIMEOUT_S + 15,
    # default 60s) so an in-flight background dial finishes and writes its
    # outcome before Docker SIGKILLs the container — otherwise a mid-ring call
    # is left stuck at 'dialing' on every restart.
    stop_grace_period: 90s
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      # Outbound trunk: the API auto-provisions/reuses a trunk named
      # usan-telnyx-outbound from the Telnyx SIP creds below. Pin
      # LIVEKIT_SIP_OUTBOUND_TRUNK_ID only to override (blank = auto).
      LIVEKIT_SIP_OUTBOUND_TRUNK_ID: ${LIVEKIT_SIP_OUTBOUND_TRUNK_ID:-}
      TELNYX_CALLER_ID: ${TELNYX_CALLER_ID:-}
      TELNYX_SIP_HOST: ${TELNYX_SIP_HOST:-sip.telnyx.com}
      TELNYX_SIP_USERNAME: ${TELNYX_SIP_USERNAME:-}
      TELNYX_SIP_PASSWORD: ${TELNYX_SIP_PASSWORD:-}
      AGENT_NAME: ${AGENT_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      # Operator/management API plane auth (GET/POST /v1/elders, /v1/dnc, /v1/calls).
      OPERATOR_API_KEY: ${OPERATOR_API_KEY}
      # Telnyx Messaging (Phase 3 send_sms). Feature flag default FALSE: no SMS is
      # ever sent until a deploy sets TELNYX_MESSAGING_ENABLED=true AND the secret /
      # profile / from-number are populated. The 3 value fields are blank-able.
      TELNYX_MESSAGING_ENABLED: ${TELNYX_MESSAGING_ENABLED:-false}
      TELNYX_MESSAGING_API_KEY: ${TELNYX_MESSAGING_API_KEY:-}
      TELNYX_MESSAGING_PROFILE_ID: ${TELNYX_MESSAGING_PROFILE_ID:-}
      TELNYX_FROM_NUMBER: ${TELNYX_FROM_NUMBER:-}
      TELNYX_MESSAGING_API_URL: ${TELNYX_MESSAGING_API_URL:-https://api.telnyx.com/v2}
      TELNYX_MESSAGING_TIMEOUT_S: ${TELNYX_MESSAGING_TIMEOUT_S:-10}
      # Admin UI / Google SSO (Plan admin-3 code; admin-5 wires it through here so
      # the settings actually reach the container). All optional — SSO is off until
      # the client id + secret + redirect are all set; SESSION_COOKIE_SECURE defaults
      # prod-safe (true) and only local-http dev sets it false.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_HD: ${GOOGLE_OAUTH_HD:-}
      ADMIN_BOOTSTRAP_EMAILS: ${ADMIN_BOOTSTRAP_EMAILS:-}
      ADMIN_SESSION_TTL_S: ${ADMIN_SESSION_TTL_S:-28800}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      ADMIN_POST_LOGIN_REDIRECT: ${ADMIN_POST_LOGIN_REDIRECT:-/}
      # OpenAPI docs (/docs, /redoc) — off by default; enable explicitly in dev.
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
      # Per-client request rate limiting.
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-60/minute}
      # Reject webhooks whose signed timestamp is older than this (seconds).
      WEBHOOK_MAX_AGE_S: ${WEBHOOK_MAX_AGE_S:-300}
      # PHI retention purge horizon (days); blank = purge disabled.
      PHI_RETENTION_DAYS: ${PHI_RETENTION_DAYS:-}
      RETRY_POLLER_ENABLED: ${RETRY_POLLER_ENABLED:-true}
      RETRY_POLL_INTERVAL_S: ${RETRY_POLL_INTERVAL_S:-30}
      # Batch & scheduled calling (spec 2026-06-10). Rollout sequence (spec §10.3):
      # enable the gate first and watch the gauges for a day, then the scheduler,
      # then a <=5-target batch. Dev defaults BOTH feature flags ON for local
      # testing; the prod overlay re-pins them OFF so the deploy ships inert.
      SCHEDULER_POLLER_ENABLED: ${SCHEDULER_POLLER_ENABLED:-true}
      SCHEDULER_POLL_INTERVAL_S: ${SCHEDULER_POLL_INTERVAL_S:-60}
      SCHEDULER_BATCH_SIZE: ${SCHEDULER_BATCH_SIZE:-50}
      CONCURRENCY_GATE_ENABLED: ${CONCURRENCY_GATE_ENABLED:-true}
      MAX_CONCURRENT_CALLS: ${MAX_CONCURRENT_CALLS:-8}
      RESERVED_CONCURRENCY: ${RESERVED_CONCURRENCY:-2}
      MAX_AUTONOMOUS_CALLS_PER_ELDER_PER_DAY: ${MAX_AUTONOMOUS_CALLS_PER_ELDER_PER_DAY:-2}
      AUTONOMOUS_DIALING_PAUSED: ${AUTONOMOUS_DIALING_PAUSED:-false}
      # Recording (Plan 4b): blank disables it; the api signs read URLs for this bucket.
      GCS_BUCKET: ${GCS_BUCKET:-}
      RECORDING_SIGNED_URL_TTL_S: ${RECORDING_SIGNED_URL_TTL_S:-3600}
      # Outbound event webhooks (spec 2026-06-10). Disjoint namespace from the
      # INBOUND LiveKit WEBHOOK_MAX_AGE_S above. Dev defaults the delivery flag
      # ON so POST /v1/webhook-endpoints/{id}/test works in every dev stack; the
      # prod overlay re-pins it OFF so the deploy ships inert (spec §10.14/§11.1).
      WEBHOOK_DELIVERY_ENABLED: ${WEBHOOK_DELIVERY_ENABLED:-true}
      WEBHOOK_DELIVERY_POLL_INTERVAL_S: ${WEBHOOK_DELIVERY_POLL_INTERVAL_S:-10}
      WEBHOOK_DELIVERY_TIMEOUT_S: ${WEBHOOK_DELIVERY_TIMEOUT_S:-10}
      WEBHOOK_DELIVERY_CIRCUIT_BREAKER_THRESHOLD: ${WEBHOOK_DELIVERY_CIRCUIT_BREAKER_THRESHOLD:-10}
      # Voice-sample preview proxy (Admin Studio): the voice picker's "Play sample"
      # calls Cartesia TTS from the API, so the API needs its OWN copy of the key
      # (the agent service also gets it for live TTS). CARTESIA_API_KEY is required
      # for previews — absent/blank yields a clean 503; the rest are optional
      # overrides matching settings.py defaults.
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      CARTESIA_API_URL: ${CARTESIA_API_URL:-https://api.cartesia.ai}
      CARTESIA_VERSION: ${CARTESIA_VERSION:-2024-11-13}
      CARTESIA_SAMPLE_MODEL: ${CARTESIA_SAMPLE_MODEL:-sonic-2}
    # The API is stateless: no on-disk writes outside /tmp, so run the root
    # filesystem read-only and block privilege escalation. /tmp is a tmpfs for
    # any transient scratch (e.g. signed-URL staging).
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp
    ports:
      # Host-only — the API is unauthenticated at this stage and is fronted by
      # TLS/Caddy in production (Plan 4). Reachable as localhost:8000 in dev.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  agent:
    image: usan-agent:local
    container_name: usan-agent
    pull_policy: build
    init: true
    stop_signal: SIGINT
    stop_grace_period: 5s
    build:
      context: ../services/agent
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: usan-agent-base:local
    depends_on:
      - livekit
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY}
      # LLM on Vertex AI (BAA-covered). No API key: the plugin uses ADC via the VM's
      # attached service account (reachable through the GCE metadata server). Plan 4e A1.
      GCP_PROJECT: ${GCP_PROJECT}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-global}
      DEFAULT_CARTESIA_VOICE_ID: ${DEFAULT_CARTESIA_VOICE_ID}
      AGENT_NAME: ${AGENT_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      API_BASE_URL: ${API_BASE_URL}
      # Recording (Plan 4b): blank disables egress; set to the recordings bucket.
      GCS_BUCKET: ${GCS_BUCKET:-}
    # Block privilege escalation. read_only is intentionally NOT set: the agent
    # needs writable model/turn-detector caches and tmp scratch at runtime.
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped

volumes:
  postgres_data:
