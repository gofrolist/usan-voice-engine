name: usan-voice-engine

# Bound container log growth (json-file defaults are unbounded — a chatty service
# can fill the VM boot disk). The prod overlay overrides api/agent to journald;
# the services that reference this anchor fall through to a capped json-file driver
# in both dev and prod. Deliberately NOT applied to api/agent — their prod journald
# driver rejects max-size/max-file options.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    # Digest-pinned (immutable) — human tag in the comment. pgvector:pg18 is a
    # floating major tag that would otherwise drift silently.
    image: pgvector/pgvector:pg18@sha256:93b01564756e7b93b9c8b2addcf178c0cab94fa360a5427c3c332509b6c146e3  # pg18
    container_name: usan-postgres
    init: true
    stop_signal: SIGINT
    stop_grace_period: 10s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Block privilege escalation. No cap_drop here: the postgres entrypoint needs
    # CHOWN/SETUID/SETGID/FOWNER to init the data dir and drop to the postgres user.
    security_opt:
      - "no-new-privileges:true"
    logging: *default-logging
    restart: unless-stopped

  redis:
    # Digest-pinned (immutable) — human tag in the comment.
    image: redis:8-alpine@sha256:5537c97815045421d01e97b82940bd2a61efaaf9dee820cd6d3ecd75c9ee763b  # 8-alpine
    container_name: usan-redis
    init: true
    stop_grace_period: 5s
    # Message bus for livekit <-> livekit-sip coordination, not durable
    # storage, so persistence is disabled.
    command: redis-server --save "" --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Block privilege escalation. No cap_drop: the redis entrypoint runs as root to
    # chown /data, then drops to the redis user (needs CHOWN/SETUID/SETGID).
    security_opt:
      - "no-new-privileges:true"
    logging: *default-logging
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.12.0
    container_name: usan-livekit
    init: true
    stop_grace_period: 5s
    depends_on:
      redis:
        condition: service_healthy
    ports:
      # Control plane — host-only. Agent/sip reach livekit over the Docker
      # network (ws://livekit:7880), not these host ports; only local tooling
      # (livekit-cli) needs them. Production fronts livekit with TLS (Plan 4).
      - "127.0.0.1:7880:7880"     # signaling (ws)
      - "127.0.0.1:7881:7881/tcp" # rtc tcp
      # Media plane — must stay reachable for RTP. Firewall at the host/VM
      # level in production (Plan 4).
      - "50000-50100:50000-50100/udp"  # rtc media
    environment:
      # livekit-server does NOT expand ${...} in a --config FILE, so the whole
      # config is passed via LIVEKIT_CONFIG (the server's --config-body env var)
      # where compose substitutes the placeholders — letting both `keys` and the
      # `webhook.api_key` resolve to the real key. Mirrors SIP_CONFIG_BODY below.
      LIVEKIT_CONFIG: |
        port: 7880
        redis:
          address: redis:6379
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: false
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        logging:
          level: info
          json: true
        turn:
          enabled: false
        room:
          empty_timeout: 60
          max_participants: 10
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - http://api:8000/webhooks/livekit
    # Hardening: drop all caps (binds only unprivileged ports ≥7880) + block
    # privilege escalation. Honored under network_mode:host in prod too.
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    logging: *default-logging
    restart: unless-stopped

  livekit-sip:
    image: livekit/sip:v1.3.1
    container_name: usan-livekit-sip
    init: true
    stop_grace_period: 5s
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "5060:5060/udp"
      # rtp_port range below must match. Kept small for Docker Desktop on Mac —
      # a 10k-port range makes up/down extremely slow and can wedge the VM
      # network layer. Widen for production on Linux.
      - "10000-10100:10000-10100/udp"
    environment:
      # livekit-sip does NOT expand ${...} in a --config file and has no
      # per-field env overrides, so credentials are injected via SIP_CONFIG_BODY
      # (the whole config as YAML). Compose substitutes the placeholders here.
      SIP_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ${LIVEKIT_URL}
        redis:
          address: redis:6379
        sip_port: 5060
        rtp_port: 10000-10100
        logging:
          level: info
          json: true
    # Hardening: drop all caps, re-add only NET_BIND_SERVICE for the privileged
    # udp/5060 SIP signaling bind. Block privilege escalation.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - "no-new-privileges:true"
    logging: *default-logging
    restart: unless-stopped

  egress:
    image: livekit/egress:v1.13.0
    container_name: usan-egress
    init: true
    stop_grace_period: 5s
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    # Room-composite egress always runs headless Chrome (audio-only just drops the
    # video track in the same Chrome session): SYS_ADMIN is mandatory since egress
    # v1.7.6 or Chrome won't start, and /dev/shm must be enlarged.
    # Drop all caps, then re-add only the documented headless-Chrome requirement.
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    # SYS_ADMIN is required by headless Chrome but is broad; block any further
    # privilege escalation (setuid binaries gaining caps) on top of it.
    security_opt:
      - "no-new-privileges:true"
    logging: *default-logging
    shm_size: "1gb"
    environment:
      # Egress does NOT expand ${...} in a --config file, so the whole config is
      # passed inline via EGRESS_CONFIG_BODY (compose substitutes the keys). The
      # internal hop ws://livekit:7880 is non-TLS, hence insecure: true. No storage
      # block: the GCS bucket + (empty) credentials are supplied per-request in the
      # RoomCompositeEgressRequest; empty credentials => upload via Application
      # Default Credentials (the GCE VM's attached service account).
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true
        redis:
          address: redis:6379
        logging:
          level: info
          json: true
    restart: unless-stopped

  api:
    image: usan-api:local
    container_name: usan-api
    pull_policy: build
    init: true
    stop_signal: SIGINT
    # Must exceed the shutdown drain window (OUTBOUND_RINGING_TIMEOUT_S + 15,
    # default 60s) so an in-flight background dial finishes and writes its
    # outcome before Docker SIGKILLs the container — otherwise a mid-ring call
    # is left stuck at 'dialing' on every restart.
    stop_grace_period: 90s
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      # Outbound trunk: the API auto-provisions/reuses a trunk named
      # usan-telnyx-outbound from the Telnyx SIP creds below. Pin
      # LIVEKIT_SIP_OUTBOUND_TRUNK_ID only to override (blank = auto).
      LIVEKIT_SIP_OUTBOUND_TRUNK_ID: ${LIVEKIT_SIP_OUTBOUND_TRUNK_ID:-}
      TELNYX_CALLER_ID: ${TELNYX_CALLER_ID:-}
      TELNYX_SIP_HOST: ${TELNYX_SIP_HOST:-sip.telnyx.com}
      TELNYX_SIP_USERNAME: ${TELNYX_SIP_USERNAME:-}
      TELNYX_SIP_PASSWORD: ${TELNYX_SIP_PASSWORD:-}
      AGENT_NAME: ${AGENT_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      # Operator/management API plane auth (GET/POST /v1/contacts, /v1/dnc, /v1/calls).
      OPERATOR_API_KEY: ${OPERATOR_API_KEY}
      # Telnyx Messaging (Phase 3 send_sms). Feature flag default FALSE: no SMS is
      # ever sent until a deploy sets TELNYX_MESSAGING_ENABLED=true AND the secret /
      # profile / from-number are populated. The 3 value fields are blank-able.
      TELNYX_MESSAGING_ENABLED: ${TELNYX_MESSAGING_ENABLED:-false}
      TELNYX_MESSAGING_API_KEY: ${TELNYX_MESSAGING_API_KEY:-}
      TELNYX_MESSAGING_PROFILE_ID: ${TELNYX_MESSAGING_PROFILE_ID:-}
      TELNYX_FROM_NUMBER: ${TELNYX_FROM_NUMBER:-}
      TELNYX_MESSAGING_API_URL: ${TELNYX_MESSAGING_API_URL:-https://api.telnyx.com/v2}
      TELNYX_MESSAGING_TIMEOUT_S: ${TELNYX_MESSAGING_TIMEOUT_S:-10}
      # Inbound two-way SMS engine (Phase 4b-2 reply / 4b-3 auto-create). SHIP-INERT:
      # each gates its half independently and needs TELNYX_MESSAGING_ENABLED + the
      # messaging secret/from-number + TELNYX_INBOUND_PUBLIC_KEY + GCP_PROJECT (Vertex reply).
      TELNYX_INBOUND_SMS_REPLY_ENABLED: ${TELNYX_INBOUND_SMS_REPLY_ENABLED:-false}
      TELNYX_INBOUND_SMS_AUTOCREATE_ENABLED: ${TELNYX_INBOUND_SMS_AUTOCREATE_ENABLED:-false}
      # Admin UI / Google SSO (Plan admin-3 code; admin-5 wires it through here so
      # the settings actually reach the container). All optional — SSO is off until
      # the client id + secret + redirect are all set; SESSION_COOKIE_SECURE defaults
      # prod-safe (true) and only local-http dev sets it false.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_HD: ${GOOGLE_OAUTH_HD:-}
      ADMIN_BOOTSTRAP_EMAILS: ${ADMIN_BOOTSTRAP_EMAILS:-}
      ADMIN_SESSION_TTL_S: ${ADMIN_SESSION_TTL_S:-28800}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      ADMIN_POST_LOGIN_REDIRECT: ${ADMIN_POST_LOGIN_REDIRECT:-/}
      # OpenAPI docs (/docs, /redoc) — off by default; enable explicitly in dev.
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
      # Per-client request rate limiting.
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-60/minute}
      # Reject webhooks whose signed timestamp is older than this (seconds).
      WEBHOOK_MAX_AGE_S: ${WEBHOOK_MAX_AGE_S:-300}
      # PHI retention purge horizon (days); blank = purge disabled.
      PHI_RETENTION_DAYS: ${PHI_RETENTION_DAYS:-}
      RETRY_POLLER_ENABLED: ${RETRY_POLLER_ENABLED:-true}
      RETRY_POLL_INTERVAL_S: ${RETRY_POLL_INTERVAL_S:-30}
      # Batch & scheduled calling (spec 2026-06-10). Rollout sequence (spec §10.3):
      # enable the gate first and watch the gauges for a day, then the scheduler,
      # then a <=5-target batch. Dev defaults BOTH feature flags ON for local
      # testing; the prod overlay re-pins them OFF so the deploy ships inert.
      SCHEDULER_POLLER_ENABLED: ${SCHEDULER_POLLER_ENABLED:-true}
      SCHEDULER_POLL_INTERVAL_S: ${SCHEDULER_POLL_INTERVAL_S:-60}
      SCHEDULER_BATCH_SIZE: ${SCHEDULER_BATCH_SIZE:-50}
      CONCURRENCY_GATE_ENABLED: ${CONCURRENCY_GATE_ENABLED:-true}
      MAX_CONCURRENT_CALLS: ${MAX_CONCURRENT_CALLS:-8}
      RESERVED_CONCURRENCY: ${RESERVED_CONCURRENCY:-2}
      MAX_AUTONOMOUS_CALLS_PER_CONTACT_PER_DAY: ${MAX_AUTONOMOUS_CALLS_PER_CONTACT_PER_DAY:-2}
      AUTONOMOUS_DIALING_PAUSED: ${AUTONOMOUS_DIALING_PAUSED:-false}
      # Recording (Plan 4b): blank disables it; the api signs read URLs for this bucket.
      GCS_BUCKET: ${GCS_BUCKET:-}
      RECORDING_SIGNED_URL_TTL_S: ${RECORDING_SIGNED_URL_TTL_S:-3600}
      # Outbound event webhooks (spec 2026-06-10). Disjoint namespace from the
      # INBOUND LiveKit WEBHOOK_MAX_AGE_S above. Dev defaults the delivery flag
      # ON so POST /v1/webhook-endpoints/{id}/test works in every dev stack; the
      # prod overlay re-pins it OFF so the deploy ships inert (spec §10.14/§11.1).
      WEBHOOK_DELIVERY_ENABLED: ${WEBHOOK_DELIVERY_ENABLED:-true}
      WEBHOOK_DELIVERY_POLL_INTERVAL_S: ${WEBHOOK_DELIVERY_POLL_INTERVAL_S:-10}
      WEBHOOK_DELIVERY_TIMEOUT_S: ${WEBHOOK_DELIVERY_TIMEOUT_S:-10}
      WEBHOOK_DELIVERY_CIRCUIT_BREAKER_THRESHOLD: ${WEBHOOK_DELIVERY_CIRCUIT_BREAKER_THRESHOLD:-10}
      # Clara Care Parity pollers (spec 002). SHIP-INERT: all default OFF so a stale .env
      # interpolates to no autonomous behavior; opt in per-stack via .env. The notification
      # outbox additionally cannot transmit unless TELNYX_MESSAGING_ENABLED=true above —
      # it backlogs as 'pending' until then (compliance Gate 1).
      NOTIFICATION_OUTBOX_ENABLED: ${NOTIFICATION_OUTBOX_ENABLED:-false}
      NOTIFICATION_OUTBOX_POLL_INTERVAL_S: ${NOTIFICATION_OUTBOX_POLL_INTERVAL_S:-60}
      CALLBACK_DIALER_POLLER_ENABLED: ${CALLBACK_DIALER_POLLER_ENABLED:-false}
      CALLBACK_DIALER_POLL_INTERVAL_S: ${CALLBACK_DIALER_POLL_INTERVAL_S:-60}
      FAMILY_REPORT_POLLER_ENABLED: ${FAMILY_REPORT_POLLER_ENABLED:-false}
      FAMILY_REPORT_POLL_INTERVAL_S: ${FAMILY_REPORT_POLL_INTERVAL_S:-3600}
      # Ed25519 public key verifying inbound Telnyx SMS webhooks (fail-closed when blank);
      # SPANISH_PROFILE_ID picks the agent profile for Spanish callbacks (blank => operator-flagged).
      TELNYX_INBOUND_PUBLIC_KEY: ${TELNYX_INBOUND_PUBLIC_KEY:-}
      SPANISH_PROFILE_ID: ${SPANISH_PROFILE_ID:-}
      # Voice-sample preview proxy (Admin Studio): the voice picker's "Play sample"
      # calls Cartesia TTS from the API, so the API needs its OWN copy of the key
      # (the agent service also gets it for live TTS). CARTESIA_API_KEY is required
      # for previews — absent/blank yields a clean 503; the rest are optional
      # overrides matching settings.py defaults.
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      CARTESIA_API_URL: ${CARTESIA_API_URL:-https://api.cartesia.ai}
      CARTESIA_VERSION: ${CARTESIA_VERSION:-2024-11-13}
      CARTESIA_SAMPLE_MODEL: ${CARTESIA_SAMPLE_MODEL:-sonic-2}
      # Vertex AI (BAA-covered, ADC via the VM service account) — the API ALSO calls Vertex
      # for the Admin Studio text-test, US4 post-call summarization, and the US8 family-report
      # narrative (separate from the agent's own copy). SUMMARIZATION_* ship-inert (default
      # OFF) — needs GCP_PROJECT set AND the flag on, else the narrative uses the deterministic
      # fallback. These run in the API process, so they MUST be on the api service env too.
      GCP_PROJECT: ${GCP_PROJECT}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-global}
      SUMMARIZATION_ENABLED: ${SUMMARIZATION_ENABLED:-false}
      SUMMARIZATION_MODEL: ${SUMMARIZATION_MODEL:-gemini-2.5-flash}
      # Post-chat analysis (Phase 4c-2 rerun-chat-analysis). SHIP-INERT: default OFF, so no
      # Vertex call (spend or PHI egress) until enabled AND GCP_PROJECT is set. Vertex ADC only.
      CHAT_ANALYSIS_ENABLED: ${CHAT_ANALYSIS_ENABLED:-false}
      CHAT_ANALYSIS_MODEL: ${CHAT_ANALYSIS_MODEL:-gemini-2.5-flash}
      # Invite email via Google Workspace (spec 2026-06-19). SHIP-INERT: default OFF, so
      # invites stay copy-link-only until a deploy flips the flag AFTER the one-time
      # domain-wide-delegation setup (Admin console + gmail.send scope on the VM SA).
      # Keyless — the VM service account impersonates INVITE_EMAIL_SENDER via IAM signJwt,
      # so there is NO secret here. Sender must be a real Workspace mailbox when enabled.
      INVITE_EMAIL_ENABLED: ${INVITE_EMAIL_ENABLED:-false}
      INVITE_EMAIL_SENDER: ${INVITE_EMAIL_SENDER:-noreply@usanretirement.com}
      INVITE_EMAIL_FROM_NAME: ${INVITE_EMAIL_FROM_NAME:-USAN Admin}
      INVITE_EMAIL_TIMEOUT_S: ${INVITE_EMAIL_TIMEOUT_S:-10}
      # RetellAI-compatible public API (feature 003). SHIP-INERT: the compat surface
      # is always mounted but returns 401 until a super-admin mints a compat key, and
      # webhook delivery + docs default OFF. To go live see docs/deployment/compat-settings-wiring.md.
      COMPAT_DOCS_ENABLED: ${COMPAT_DOCS_ENABLED:-false}
      COMPAT_WEBHOOK_ALLOWED_HOSTS: ${COMPAT_WEBHOOK_ALLOWED_HOSTS:-}
      COMPAT_DEFAULT_TIMEZONE: ${COMPAT_DEFAULT_TIMEZONE:-America/New_York}
      COMPAT_KEY_RATE_LIMIT: ${COMPAT_KEY_RATE_LIMIT:-600/minute}
      COMPAT_WEBHOOK_DELIVERY_ENABLED: ${COMPAT_WEBHOOK_DELIVERY_ENABLED:-false}
      # Phase 5 knowledge-bases (pgvector + Vertex text-embedding-005). SHIP-INERT: both
      # poller and embedding default OFF. To activate: set KB_EMBEDDING_ENABLED=true,
      # GCP_PROJECT, and KB_INGESTION_POLLER_ENABLED=true in Secret Manager usan-prod-env
      # AND the VM infra/.env BEFORE cutting the v* tag (deploy does not re-fetch the secret).
      KB_EMBEDDING_ENABLED: ${KB_EMBEDDING_ENABLED:-false}
      KB_EMBEDDING_MODEL: ${KB_EMBEDDING_MODEL:-text-embedding-005}
      KB_EMBEDDING_LOCATION: ${KB_EMBEDDING_LOCATION:-us-central1}
      KB_INGESTION_POLLER_ENABLED: ${KB_INGESTION_POLLER_ENABLED:-false}
      KB_INGESTION_POLL_INTERVAL_S: ${KB_INGESTION_POLL_INTERVAL_S:-15}
      KB_INGESTION_BATCH_SIZE: ${KB_INGESTION_BATCH_SIZE:-10}
      KB_INGESTION_LEASE_SECONDS: ${KB_INGESTION_LEASE_SECONDS:-300}
      KB_INGESTION_MAX_ATTEMPTS: ${KB_INGESTION_MAX_ATTEMPTS:-3}
      # KB retrieval / RAG (Phase 5b chat, 5c voice). SHIP-INERT: default OFF, so no query
      # embed until enabled AND GCP_PROJECT is set. MAX_DISTANCE is a cosine-distance ceiling
      # (0=identical..2=opposite) — the 0.7 default is permissive and MUST be tuned against
      # real KB content. kb_retrieval_voice_enabled is the api-side embed/search gate for voice.
      KB_RETRIEVAL_ENABLED: ${KB_RETRIEVAL_ENABLED:-false}
      KB_RETRIEVAL_VOICE_ENABLED: ${KB_RETRIEVAL_VOICE_ENABLED:-false}
      KB_RETRIEVAL_TOP_K: ${KB_RETRIEVAL_TOP_K:-5}
      KB_RETRIEVAL_MAX_DISTANCE: ${KB_RETRIEVAL_MAX_DISTANCE:-0.7}
      KB_RETRIEVAL_MAX_CONTEXT_CHARS: ${KB_RETRIEVAL_MAX_CONTEXT_CHARS:-8000}
      # Conversation-flow DAG runtime for chat/SMS (Phase 6-runtime-chat). SHIP-INERT:
      # default OFF, so merging changes no runtime behavior until a deploy sets this
      # AND the VM infra/.env BEFORE cutting the v* tag (deploy does not re-fetch the secret).
      FLOW_RUNTIME_ENABLED: ${FLOW_RUNTIME_ENABLED:-false}
      # Conversation-flow DAG runtime for VOICE calls (Phase 6-runtime-voice). SHIP-INERT:
      # default OFF; the classifier runs api-side (worker-token-gated /v1/runtime/flow-advance).
      FLOW_RUNTIME_VOICE_ENABLED: ${FLOW_RUNTIME_VOICE_ENABLED:-false}
    # The API is stateless: no on-disk writes outside /tmp, so run the root
    # filesystem read-only and block privilege escalation. /tmp is a tmpfs for
    # any transient scratch (e.g. signed-URL staging).
    # Stateless app: drop all caps (binds only the unprivileged :8000) on top of
    # the read-only rootfs + no-new-privileges.
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      # Bound the tmpfs so a runaway /tmp write can't exhaust host memory.
      - /tmp:size=64m
    ports:
      # Host-only — the API is unauthenticated at this stage and is fronted by
      # TLS/Caddy in production (Plan 4). Reachable as localhost:8000 in dev.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  agent:
    image: usan-agent:local
    container_name: usan-agent
    pull_policy: build
    init: true
    stop_signal: SIGINT
    stop_grace_period: 5s
    build:
      context: ../services/agent
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: usan-agent-base:local
    depends_on:
      - livekit
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY}
      # LLM on Vertex AI (BAA-covered). No API key: the plugin uses ADC via the VM's
      # attached service account (reachable through the GCE metadata server). Plan 4e A1.
      GCP_PROJECT: ${GCP_PROJECT}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-global}
      DEFAULT_CARTESIA_VOICE_ID: ${DEFAULT_CARTESIA_VOICE_ID}
      AGENT_NAME: ${AGENT_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      API_BASE_URL: ${API_BASE_URL}
      # Recording (Plan 4b): blank disables egress; set to the recordings bucket.
      GCS_BUCKET: ${GCS_BUCKET:-}
      # Conversation-flow DAG runtime for VOICE calls (Phase 6-runtime-voice). SHIP-INERT:
      # default OFF; gates whether the agent steers via /v1/runtime/flow-advance calls.
      FLOW_RUNTIME_VOICE_ENABLED: ${FLOW_RUNTIME_VOICE_ENABLED:-false}
      # Voice-RAG (Phase 5c). The worker-side gate for the per-turn retrieve_kb_context call;
      # a true no-op when off. The api has its own KB_RETRIEVAL_VOICE_ENABLED (the real
      # embed/search gate). Timeout bounds the per-turn HTTP call so a slow lookup can't
      # stall turn-taking (on timeout the worker speaks without injected context).
      KB_RETRIEVAL_VOICE_ENABLED: ${KB_RETRIEVAL_VOICE_ENABLED:-false}
      KB_RETRIEVAL_TIMEOUT_S: ${KB_RETRIEVAL_TIMEOUT_S:-3.0}
    # Block privilege escalation + drop all caps (the worker binds no privileged
    # ports). read_only is intentionally NOT set: the agent needs writable
    # model/turn-detector caches and tmp scratch at runtime.
    cap_drop:
      - ALL
    security_opt:
