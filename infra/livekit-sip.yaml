api_key: ${LIVEKIT_API_KEY}
api_secret: ${LIVEKIT_API_SECRET}
ws_url: ${LIVEKIT_URL}

# Shared message bus with the livekit server (must point at the same redis).
redis:
  address: redis:6379

sip_port: 5060
# Local dev: small RTP range. Docker Desktop for Mac creates one forwarding
# rule per published port — the full 10000-20000 range (10k ports) makes
# `compose up`/`down` pathologically slow and wedges the VM. ~100 ports here
# handles ~50 concurrent calls. Widen this (and the compose port mapping) for
# production on a real Linux host.
rtp_port: 10000-10100

logging:
  level: info
  json: true
