# Admin UI overlay (prod) — the React SPA static container, fronted by the edge
# Caddy at ADMIN_DOMAIN and proxied through Cloudflare (WAF/DDoS). Access is
# enforced at the app layer (Google SSO + RLS), not a CIDR allowlist. Layer LAST,
# after the tls + monitoring overlays:
#   docker compose --env-file infra/.env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.prod.yml \
#     -f infra/docker-compose.tls.yml \
#     -f infra/docker-compose.monitoring.yml \
#     -f infra/docker-compose.admin.yml up -d
#
# Requires in .env: ADMIN_DOMAIN, and (for SSO to function)
# GOOGLE_OAUTH_CLIENT_ID/SECRET/REDIRECT_URI + ADMIN_BOOTSTRAP_EMAILS (those reach
# the api via the base file's environment map).
services:
  admin-ui:
    image: ${IMAGE_REGISTRY:-us-east1-docker.pkg.dev/usan-retirement/usan}/usan-admin-ui:${IMAGE_TAG:?IMAGE_TAG must be set to an explicit tag}
    container_name: usan-admin-ui
    init: true
    pull_policy: always
    # Static assets only; no inbound ports published — the edge Caddy reaches it on
    # the bridge as admin-ui:8080 (public via Cloudflare; app-layer auth). Block
    # privilege escalation; the image already runs as non-root 1001.
    cap_drop:
      - ALL
    # The Caddy binary ships a file capability (cap_net_bind_service+ep, baked into the
    # official caddy image). Under no-new-privileges + cap_drop:ALL the kernel refuses to
    # exec a file-capped binary whose caps aren't in the bounding set ("exec caddy failed:
    # Operation not permitted"), so admin-ui crash-loops. Re-add NET_BIND_SERVICE so the
    # bounding set permits the exec — same as the edge caddy / livekit-sip. admin-ui only
    # binds :8080, so the cap is never exercised; a future `setcap -r` in the image would
    # let us drop even this.
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped
    # Ship stdout to journald so the Ops Agent ingests it into Cloud Logging.
    logging:
      driver: journald

  # The edge Caddy (defined in the tls overlay) gains the admin.<domain> site env.
  # Merges with the tls overlay's caddy.environment map.
  caddy:
    environment:
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
